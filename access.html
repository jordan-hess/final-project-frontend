<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"> 
    <script
    src="https://kit.fontawesome.com/d457bb2530.js"
    crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="access.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessories</title>
</head>
<body>
    <div class="divid">
        <nav class="site-header" aria-label="Primary">
            <ul class="navbar">
                <img src="logo.png" alt="Store logo">
                <li>
                    <i class="fas fa-home"></i><a href="index.html" class="navbar-home">HOME</a>
                </li>
                <li>
                    <i class="fas fa-percentage"></i><a href="sales.html" class="navbar-about">SALE</a>
                </li>
                <li>
                    <i class="fas fa-tag"></i><a href="brand.html" class="navbar-home">BRANDS</a>
                </li>
                <li>
                    <i class="fab fa-redhat"></i><a href="access.html" class="navbar-about">ACCESSORIES</a>
                </li>
                <li>
                    <i class="fas fa-shoe-prints"></i><a href="kicks.html" class="navbar-home">FOOTWEAR</a>
                </li>
                <li>
                    <i class="fas fa-tshirt"></i><a href="clothes.html" class="navbar-about">APPAREL</a>
                </li>
                <li>
                    <i class="fas fa-phone"></i><a href="contact.html" class="navbar-about">CONTACT</a>
                </li>
                <li>
                    <i class="fas fa-shopping-cart"></i><a href="cart.html" class="navbar-cart">CART <span class="cart-badge" aria-label="Items in cart">0</span></a>
                </li>
            </ul>
        </nav>
        <div class="sep" role="main">
            <div class="tick">
                <img src="Nikes-Just-Do-It-Campaign-Strategy.jpg" alt="">
            </div>
            <div class="access-con">
                <div class="access">
                    <h1>Accessories</h1>
                    <button class="user"><i class="fas fa-shopping-basket" onclick="openCart()"></i></button>
                </div>
                <div class="ass">
                </div>
                <h1>Accessories On Sale</h1>
                <div class="sale-ass">
                    <div class="onsale"></div>
                    <div class="for-sale"></div>
                    <div class="three"></div>
                    <div class="four"></div>
                </div>
                <div class="mycart" id="carts-items" role="dialog" aria-modal="true" aria-label="Shopping cart">
                    <div class="top">
                        <h1>cart</h1>
                        <button class="close" onclick="openCart()" aria-label="Close cart">X</button>
                    </div>
                    <div data-cart-items></div>
                    <div class="cart-total">
                        <h1 class="total-head">Total:</h1>
                        <span class="total" data-cart-total>R0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="motion.js"></script>
    <script src="toast.js"></script>
    <script src="cartStore.js"></script>
    <script src="access.js"></script>
</body>
</html>
