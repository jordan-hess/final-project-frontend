<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"> 
    <script
    src="https://kit.fontawesome.com/d457bb2530.js"
    crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
</head>
<body>
    <script>document.documentElement.classList.toggle('sidebar-pinned', localStorage.getItem('sidebarPinned') === 'true');</script>
    <div class="divid">
        <nav class="site-header" aria-label="Primary" id="primary-nav">
            <button type="button" class="sidebar-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Expand navigation" onclick="Motion.toggleSidebarPin(event)"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
            <ul class="navbar">
                <img src="logo.png" alt="Store logo">
                <li>
                    <a href="index.html" class="navbar-home"><i class="fas fa-home" aria-hidden="true"></i><span class="nav-label">Home</span></a>
                </li>
                <li>
                    <a href="sales.html" class="navbar-about"><i class="fas fa-percentage" aria-hidden="true"></i><span class="nav-label">Sale</span></a>
                </li>
                <li>
                    <a href="brand.html" class="navbar-home"><i class="fas fa-tag" aria-hidden="true"></i><span class="nav-label">Brands</span></a>
                </li>
                <li>
                    <a href="access.html" class="navbar-about"><i class="fab fa-redhat" aria-hidden="true"></i><span class="nav-label">Accessories</span></a>
                </li>
                <li>
                    <a href="kicks.html" class="navbar-home"><i class="fas fa-shoe-prints" aria-hidden="true"></i><span class="nav-label">Footwear</span></a>
                </li>
                <li>
                    <a href="clothes.html" class="navbar-about"><i class="fas fa-tshirt" aria-hidden="true"></i><span class="nav-label">Apparel</span></a>
                </li>
                <li>
                    <a href="contact.html" class="navbar-about"><i class="fas fa-phone" aria-hidden="true"></i><span class="nav-label">Contact</span></a>
                </li>
                <li>
                    <a href="cart.html" class="navbar-cart"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span class="nav-label">Cart</span><span class="cart-badge" aria-label="Items in cart">0</span></a>
                </li>
            </ul>
        </nav>
        <div class="sep" role="main">
            <div class="tick">
                <img src="basketball-michael-jordan-wallpaper-preview.jpg" alt="">
            </div>
            <div class="welcome">
                <div class="mes"></div>
            </div>
            <div class="landing">
                <div class="top">
                    <h1>JUST DROPPED</h1>
                    <div class="three">
                        <input type="text" placeholder="What are you looking for?">
                        <div class="icons">
                            <button class="cart" onclick="openCart() & whenOpen()" aria-label="Open cart"><i class="fas fa-shopping-basket" aria-hidden="true"></i></button>
                            <button class="user" onclick="openModal()" aria-label="Register or log in"><i class="far fa-user" aria-hidden="true"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <section class="just-in">
                <div class="products">
                    <div class="slick-slider"></div>
                </div>
            </section>
            <div class="trend-con">
                <div class="left-con">
                    <div class="left"></div>
                </div>
                <div class="other-trends">
                    <div class="right-con"></div>
                    <div class="right-right-con"></div>
                    <div class="right4"></div>
                    <div class="right5"></div>
                    <div class="right6"></div>
                    <div class="right7"></div>
                </div>
                <div class="mycart" id="carts-items" role="dialog" aria-modal="true" aria-label="Shopping cart">
                    <div class="cart-panel">
                        <div class="top">
                            <h1>cart</h1>
                            <button class="close" onclick="openCart()" aria-label="Close cart" type="button">X</button>
                        </div>
                        <div data-cart-items></div>
                        <div class="cart-total">
                            <h1 class="total-head">Total:</h1>
                            <span class="total" data-cart-total>R0.00</span>
                        </div>
                    </div>
                </div>
                <div id="modal" role="dialog" aria-modal="true" aria-label="Register">
                    <form class="form" id="form" onsubmit="event.preventDefault(); registerUser()">
                        <button class="close" onclick="openModal()" aria-label="Close register form" type="button">X</button>
                        <header>Register</header>
                        <div class="user-details">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" class="regi-name" placeholder="Your name" required>
                            <div class="line"></div>
                            <label for="username">Username</label>
                            <input type="text" id="username" class="log-usernm" placeholder="Type your username" required>
                            <div class="line"></div>
                            <label for="password">Password</label>
                            <input type="password" id="password" class="log-pass" placeholder="Type your password" required>
                            <div class="line"></div>
                            <label for="email">Email</label>
                            <input type="email" id="email" class="log-pass" placeholder="Email Address" required>
                            <div class="line"></div>
                            <button class="btn btn-primary sign-up-btn" id="sign-up" type="submit">Submit</button>
                            <p class="log">
                                <a href="#" onclick="event.preventDefault(); openLog()" class="register-link">Already a Registered User? Log in</a>
                            </p>
                        </div>
                    </form>
                </div>
                <div id="login" role="dialog" aria-modal="true" aria-label="Log in">
                    <form class="login-page" onsubmit="event.preventDefault(); logIn()">
                        <button class="close" onclick="openLog()" aria-label="Close log in form" type="button">X</button>
                        <div class="login-con">
                            <h1>login</h1>
                            <label for="logEmail">Email</label>
                            <input type="email" placeholder="Enter Email" id="logEmail" name="" required>
                            <div class="line"></div>
                            <label for="logPassword">Password</label>
                            <input type="password" placeholder="Enter Password" id="logPassword" name="" required>
                            <div class="line"></div>
                            <button type="submit" class="btn btn-primary log-me-in">Log in</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts Section -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabaseClient.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="motion.js"></script>
    <script src="toast.js"></script>
    <script src="cartStore.js"></script>
    <script src="./styles.js"></script>
</body>
</html>
