<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="contact.js">
    <link rel="stylesheet" href="contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"> 
    <script
    src="https://kit.fontawesome.com/d457bb2530.js"
    crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="divid">
        <nav class="site-header" aria-label="Primary">
            <ul class="navbar">
                <img src="logo.png" alt="Store logo">
                <li>
                    <i class="fas fa-home"></i><a href="index.html" class="navbar-home">HOME</a>
                </li>
                <li>
                    <i class="fas fa-percentage"></i><a href="sales.html" class="navbar-about">SALE</a>
                </li>
                <li>
                    <i class="fas fa-tag"></i><a href="brand.html" class="navbar-home">BRANDS</a>
                </li>
                <li>
                    <i class="fab fa-redhat"></i><a href="access.html" class="navbar-about">ACCESSORIES</a>
                </li>
                <li>
                    <i class="fas fa-shoe-prints"></i><a href="kicks.html" class="navbar-home">FOOTWEAR</a>
                </li>
                <li>
                    <i class="fas fa-tshirt"></i><a href="clothes.html" class="navbar-about">APPAREL</a>
                </li>
                <li>
                    <i class="fas fa-phone"></i><a href="contact.html" class="navbar-about">CONTACT</a>
                </li>
                <li>
                    <i class="fas fa-shopping-cart"></i><a href="cart.html" class="navbar-cart">CART <span class="cart-badge" aria-label="Items in cart">0</span></a>
                </li>
            </ul>
        </nav>
        <div class="sep" role="main">
            <div class="tick">
                <img src="unnamed.jpg" alt="">
            </div>
            <div class="background">
                <img src="original.png" alt="">
            </div>
            <div class="contact">
                <div class="contact-con">
                    <form action="">
                        <h1>Contact Us</h1>
                        <label for="contact-name">Full Name</label>
                        <input id="contact-name" type="text" placeholder="*required" required>
                        <div class="line"></div>
                        <label for="contact-number">Contact Number</label>
                        <input id="contact-number" type="tel" placeholder="*required" required>
                        <div class="line"></div>
                        <label for="contact-email">Email Address</label>
                        <input id="contact-email" type="email" placeholder="*required" required>
                        <div class="line"></div>
                        <label for="contact-message">Message</label>
                        <input id="contact-message" type="text" placeholder="Leave a message here">
                        <div class="line"></div>
                        <div class="button-con">
                            <button class="btn btn-primary send" type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="motion.js"></script>
    <script src="toast.js"></script>
    <script src="cartStore.js"></script>
    <script src="contact.js"></script>
    <script>
      Motion.animateHeaderShadow(".site-header");
    </script>
</body>
</html>
