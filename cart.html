<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bowlby+One+SC&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"> 
    <script
    src="https://kit.fontawesome.com/d457bb2530.js"
    crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="cart.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <script>document.documentElement.classList.toggle('sidebar-pinned', localStorage.getItem('sidebarPinned') === 'true');</script>
    <div class="divid">
        <nav class="site-header" aria-label="Primary" id="primary-nav">
            <button type="button" class="sidebar-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Expand navigation" onclick="Motion.toggleSidebarPin(event)"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
            <ul class="navbar">
                <img src="logo.png" alt="Store logo">
                <li>
                    <a href="index.html" class="navbar-home"><i class="fas fa-home" aria-hidden="true"></i><span class="nav-label">Home</span></a>
                </li>
                <li>
                    <a href="sales.html" class="navbar-about"><i class="fas fa-percentage" aria-hidden="true"></i><span class="nav-label">Sale</span></a>
                </li>
                <li>
                    <a href="brand.html" class="navbar-home"><i class="fas fa-tag" aria-hidden="true"></i><span class="nav-label">Brands</span></a>
                </li>
                <li>
                    <a href="access.html" class="navbar-about"><i class="fab fa-redhat" aria-hidden="true"></i><span class="nav-label">Accessories</span></a>
                </li>
                <li>
                    <a href="kicks.html" class="navbar-home"><i class="fas fa-shoe-prints" aria-hidden="true"></i><span class="nav-label">Footwear</span></a>
                </li>
                <li>
                    <a href="clothes.html" class="navbar-about"><i class="fas fa-tshirt" aria-hidden="true"></i><span class="nav-label">Apparel</span></a>
                </li>
                <li>
                    <a href="contact.html" class="navbar-about"><i class="fas fa-phone" aria-hidden="true"></i><span class="nav-label">Contact</span></a>
                </li>
                <li>
                    <a href="cart.html" class="navbar-cart"><i class="fas fa-shopping-cart" aria-hidden="true"></i><span class="nav-label">Cart</span><span class="cart-badge" aria-label="Items in cart">0</span></a>
                </li>
            </ul>
        </nav>
        <div class="sep" role="main">
            <div class="tick">
                <img src="papers.co-al90-nike-just-do-it-dark-simple-minimal-logo-art-35-3840x2160-4k-wallpaper.jpg" alt="">
            </div>
            <div class="cart">
                <div class="cart-con">
                    <h1>Your Cart</h1>
                    <div data-cart-items></div>
                    <div class="cart-page-total">
                        <span>Total</span>
                        <span data-cart-total>R0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="motion.js"></script>
    <script src="toast.js"></script>
    <script src="cartStore.js"></script>
    <script>
      Motion.animateHeaderShadow(".site-header");
    </script>
